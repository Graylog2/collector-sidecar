name: "Build V2"

on:
  push:
    branches: ["v2"]

defaults:
  run:
    shell: "bash"

jobs:
  build:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
        with:
          persist-credentials: false

      - name: "Setup Go environment"
        uses: "actions/setup-go@v6"
        with:
          go-version: "1.26"

      - name: "Run tests"
        run: "make v2test"

      - name: "Build binaries"
        run: "make v2all"

      - name: "Setup env"
        run: |
          echo "timestamp=$(date '+%F-%H-%M-%S')" | tee -a "$GITHUB_ENV"

      - name: "Setup nFPM"
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          gh release download --repo goreleaser/nfpm -p "*amd64.deb" -O nfpm.deb
          sudo apt-get install -y ./nfpm.deb

      - name: "Build packages"
        env:
          TIMESTAMP: "${{ env.timestamp }}"
        run: "nfpm package -f dist/v2/nfpm.yaml -p deb"

      - name: "Upload build artifacts to S3"
        env:
          AWS_DEFAULT_REGION: "eu-west-1"
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_S3_SNAPSHOTS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SNAPSHOTS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: "${{ secrets.AWS_S3_SNAPSHOTS_BUCKET }}"
          TIMESTAMP: "${{ env.timestamp }}"
        run: |
          printf -- "## Artifacts\n\n" >> "$GITHUB_STEP_SUMMARY"

          for file in $(find . -maxdepth 1 -name 'graylog-collector*' -type f | sort -V); do
            aws s3 cp --no-progress "$file" "s3://${AWS_S3_BUCKET}/sidecar/v2/${TIMESTAMP}/"
            printf -- "- https://downloads.graylog.org/snapshots/sidecar/v2/%s/%s\n" "$TIMESTAMP" "$file" >> "$GITHUB_STEP_SUMMARY"
          done
